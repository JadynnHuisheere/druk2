<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Druk's Website</title>
    <link rel="stylesheet" href="css.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .signup-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow);
            width: 300px;
            border: 1px solid var(--border-color);
        }
        .signup-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-color);
            color: var(--accent-text);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.3s;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error {
            color: #ff4444;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }
        .link a:hover {
            text-decoration: underline;
        }

        .step-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .step-title {
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        .step-subtitle {
            margin: 0.25rem 0 0 0;
            font-size: 0.95rem;
            color: var(--secondary-text);
        }

        .timeline {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .timeline-step {
            flex: 1;
            height: 7px;
            border-radius: 4px;
            background: var(--border-color);
        }

        .timeline-step.active {
            background: var(--accent-color);
        }

        .badge {
            background: #fef6e0;
            color: #2b4f7b;
            border: 1px solid #f6dd98;
            border-radius: 4px;
            padding: 0.35rem 0.6rem;
            font-size: 0.84rem;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .info-box {
            background: rgba(13, 110, 253, 0.05);
            border: 1px solid rgba(13, 110, 253, 0.3);
            border-radius: 6px;
            padding: 0.85rem;
            margin-bottom: 1rem;
            color: #0f4db2;
            font-size: 0.88rem;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="signup-container">
        <div class="step-header">
            <div class="step-title">SIGN UP</div>
            <div class="step-subtitle">You have <span class="badge" id="countdown">109</span> seconds to complete signup.</div>
        </div>

        <div class="timeline">
            <div class="timeline-step active"></div>
            <div class="timeline-step"></div>
        </div>

        <div class="info-box">
            VERIFY IDENTITY
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label for="accessId">AuctionACCESS ID</label>
                <input type="text" id="accessId" placeholder="ex. 101234567" required pattern="\d{8,12}">
            </div>
            <div class="form-group">
                <label for="idLast4">Last 4 Digits of Social Security or Gov't ID</label>
                <input type="text" id="idLast4" placeholder="1234" required pattern="\d{4}" maxlength="4">
            </div>
            <button type="submit" class="btn" id="signupBtn">VERIFY MY IDENTITY</button>
        </form>
        <div id="errorMessage" class="error" style="display: none;"></div>
        <div class="link">
            <a href="login.html">Already have an account? Login</a>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Countdown timer for the candid feel
        let countdown = 109;
        const counterEl = document.getElementById('countdown');
        const timerId = setInterval(() => {
            if (!counterEl) {
                clearInterval(timerId);
                return;
            }
            countdown -= 1;
            counterEl.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(timerId);
                counterEl.textContent = '0';
                alert('Time expired. Please refresh and try again.');
            }
        }, 1000);
    </script>
</body>
</html>
