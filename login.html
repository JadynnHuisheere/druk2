<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Druk's Website</title>
    <link rel="stylesheet" href="css.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-color);
            color: var(--text-color);
        }
        .login-container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow);
            width: 300px;
            border: 1px solid var(--border-color);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-color);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-color);
            color: var(--accent-text);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.3s;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error {
            color: #ff4444;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        .link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }
        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="accessId">AuctionACCESS ID</label>
                <input type="text" id="accessId" placeholder="ex. 101234567" required pattern="\d{8,12}">
            </div>
            <div class="form-group">
                <label for="idLast4">Last 4 Digits of SSN/Gov't ID</label>
                <input type="text" id="idLast4" placeholder="1234" required pattern="\d{4}" maxlength="4">
            </div>
            <button type="submit" class="btn" id="loginBtn">Login</button>
        </form>
        <div id="errorMessage" class="error" style="display: none;"></div>
        <div class="switcher" style="margin:1rem 0;text-align:center; font-size:0.93rem; color:var(--secondary-text);">or</div>

        <div class="admin-login" style="margin-top:0.8rem; padding:0.8rem; border:1px solid var(--border-color); border-radius:8px; background: var(--subheader-bg);">
            <h3 style="margin:0 0 0.6rem; font-size:1rem; color:var(--text-color);">Admin Login</h3>
            <div class="form-group">
                <label for="adminId">Admin ID</label>
                <input type="text" id="adminId" placeholder="admin@drukauth.local" />
            </div>
            <div class="form-group">
                <label for="adminPassword">Admin Password</label>
                <input type="password" id="adminPassword" placeholder="******" />
            </div>
            <button id="adminLoginBtn" class="btn" style="background:#1f4d92;">Admin Sign In</button>
        </div>

        <div id="adminErrorMessage" class="error" style="display: none;"></div>

        <div class="link">
            <a href="signup.html">Don't have an account? Sign up</a>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
