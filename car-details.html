<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Details - Druk Classic Bid</title>
    <link rel="stylesheet" href="css.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="dark-theme car-details-page" data-page="car-details">
    <div id="header-placeholder"></div>

    <div id="below-header-placeholder"></div>

    <!-- Main Content Area -->
    <main class="main-container">
        <!-- Left Sidebar -->
        <div id="left-sidebar-placeholder"></div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="car-detail-breadcrumb">
                <a href="classic_auto_auction.html" class="back-link"><i class="fas fa-chevron-left"></i> Back to Auctions</a>
            </div>
            <section class="car-detail" id="carDetailSection">
                <p class="car-detail-loading">Loading vehicle details&hellip;</p>
            </section>
        </div>

        <!-- Right Sidebar -->
        <aside class="right-sidebar" id="rightSidebar">
            <div class="sidebar-header">
                <button class="collapse-btn" onclick="toggleRightSidebar()"><i class="fas fa-angle-right"></i></button>
                <h3 class="sidebar-title">Quick Actions</h3>
            </div>
            
            <div class="collapsed-icons">
                <div class="collapsed-icon"><i class="fas fa-envelope"></i></div>
                <div class="collapsed-icon"><i class="fas fa-share-alt"></i></div>
                <div class="collapsed-icon"><i class="fas fa-star"></i></div>
            </div>
            
            <div class="right-sidebar-content">
            <ul class="quick-actions">
                <li><a href="#"><i class="fas fa-envelope"></i> Contact Seller</a></li>
                <li><a href="#"><i class="fas fa-share-alt"></i> Share on Social Media</a></li>
                <li><a href="#"><i class="fas fa-star"></i> Add to Watchlist</a></li>
            </ul>
            </div>
        </aside>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script>
        // Re-init search panel using the shared partial IDs once components are ready
        document.addEventListener('components:ready', function () {
            initBackToAuctions();

            var triggerBtn = document.getElementById('searchTriggerBtn');
            var filtersPanel = document.getElementById('searchFiltersPanel');
            var filterBadge = document.getElementById('activeFilterBadge');
            var applyBtn = document.getElementById('applySearchFiltersBtn');
            var clearBtn = document.getElementById('clearSearchFiltersBtn');
            var searchWrap = document.querySelector('.below-header-search');

            if (triggerBtn && filtersPanel) {
                triggerBtn.addEventListener('click', function () {
                    filtersPanel.hidden = !filtersPanel.hidden;
                });

                if (applyBtn) {
                    applyBtn.addEventListener('click', function () {
                        var checked = filtersPanel.querySelectorAll('input[type="checkbox"]:checked');
                        if (filterBadge) {
                            filterBadge.textContent = String(checked.length);
                            filterBadge.hidden = checked.length === 0;
                        }
                        filtersPanel.hidden = true;
                    });
                }

                if (clearBtn) {
                    clearBtn.addEventListener('click', function () {
                        filtersPanel.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
                            cb.checked = false;
                        });
                        if (filterBadge) {
                            filterBadge.textContent = '0';
                            filterBadge.hidden = true;
                        }
                        filtersPanel.hidden = true;
                    });
                }

                if (searchWrap) {
                    document.addEventListener('click', function (event) {
                        if (!searchWrap.contains(event.target)) {
                            filtersPanel.hidden = true;
                        }
                    });
                }
            }

            // Load car details
            loadCarDetails();
        });

        function initBackToAuctions() {
            var backLink = document.querySelector('.back-link');
            if (!backLink) return;

            backLink.addEventListener('click', function (event) {
                var openerWindow = window.opener;

                if (!openerWindow || openerWindow.closed) {
                    return;
                }

                event.preventDefault();

                try {
                    openerWindow.focus();
                    window.close();

                    window.setTimeout(function () {
                        if (!window.closed) {
                            window.location.href = backLink.href;
                        }
                    }, 150);
                } catch (err) {
                    window.location.href = backLink.href;
                }
            });
        }

        function loadCarDetails() {
            var params = new URLSearchParams(window.location.search);
            var carId = params.get('car');
            if (!carId) {
                showCarError('No vehicle selected. <a href="classic_auto_auction.html">Browse auctions &rarr;</a>');
                return;
            }
            fetch('data/cars.json')
                .then(function (res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(function (data) {
                    var car = data.cars.find(function (c) { return c.id === carId; });
                    if (!car) {
                        showCarError('Vehicle not found. <a href="classic_auto_auction.html">Browse auctions &rarr;</a>');
                        return;
                    }
                    renderCarDetail(car);
                    document.title = car.year + ' ' + car.make + ' ' + car.model + ' \u2014 Druk Classic Bid';
                })
                .catch(function () {
                    showCarError('Could not load vehicle data. Please try again.');
                });
        }

        function showCarError(msg) {
            var section = document.getElementById('carDetailSection');
            if (section) section.innerHTML = '<p class="car-detail-error">' + msg + '</p>';
        }

        function renderCarDetail(car) {
            var section = document.getElementById('carDetailSection');
            if (!section) return;
            var minBid = car.currentBid + 100;
            section.innerHTML =
                '<h2>' + car.year + ' ' + car.make + ' ' + car.model + '</h2>' +
                '<div class="car-info">' +
                    '<img src="' + car.photo + '" alt="' + car.year + ' ' + car.make + ' ' + car.model + '">' +
                    '<div class="car-description">' +
                        '<h3>' + car.year + ' ' + car.make + ' ' + car.model + '</h3>' +
                        '<p><strong>Engine:</strong> ' + car.engine + '</p>' +
                        '<p><strong>Transmission:</strong> ' + car.transmission + '</p>' +
                        '<p><strong>Body Style:</strong> ' + car.bodyStyle + '</p>' +
                        '<p><strong>Mileage:</strong> ' + car.mileage + ' miles</p>' +
                        '<p><strong>Condition:</strong> ' + car.condition + '</p>' +
                        '<p class="car-description-text">' + car.description + '</p>' +
                    '</div>' +
                '</div>' +
                '<div class="bid-section">' +
                    '<h3>Bid Now</h3>' +
                    '<p class="current-bid">Current Bid: $' + car.currentBid.toLocaleString() + '</p>' +
                    '<p class="auction-time-remaining"><i class="fas fa-clock"></i> Time Remaining: ' + car.timeRemaining + '</p>' +
                    '<form action="#" method="post">' +
                        '<label for="bid-amount">Your Bid ($):</label>' +
                        '<input type="number" id="bid-amount" name="bid-amount" min="' + minBid + '" step="100" required>' +
                        '<button type="submit">Place Bid</button>' +
                    '</form>' +
                '</div>';
        }
    </script>
</body>
</html>
